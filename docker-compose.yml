services:
  postgres:
    image: postgres:17.2
    container_name: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    shm_size: 256mb # Ajusta si necesitas mayor rendimiento en producción
    env_file:
      - .env.prod
    restart: always
    networks:
      - caddy_network
    deploy:
      resources:
        limits:
          memory: 1G       # Limitar a 1 GB de memoria
          cpus: "1"        # Limitar a 1 CPU
        reservations:
          memory: 512M     # Garantizar 512 MB mínimos
          cpus: "0.5"      # Garantizar 0.5 CPUs mínimos" 

  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: pgadmin
    ports:
      - "8081:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    env_file:
      - .env.prod
    networks:
      - caddy_network

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  caddy_network:
    external: true
