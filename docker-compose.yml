services:
  postgres:
    image: postgres:17.2
    container_name: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env.prod
    restart: always
    networks:
      - caddy_network
    deploy:
      resources:
        limits:
          memory: 1G       # Limitar a 1 GB de memoria
          cpus: "1"        # Limitar a 1 CPU
        reservations:
          memory: 512M     # Garantizar 512 MB mínimos
          cpus: "0.5"      # Garantizar 0.5 CPUs mínimos" 

volumes:
  postgres_data:
    driver: local

networks:
  caddy_network:
    external: true